<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRT 명함 — AD (Claude 디자인)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,sans-serif;background:#E8E6DC;color:#1f1e1d;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:24px;padding:48px 24px 80px;-webkit-font-smoothing:antialiased;}
  .head{text-align:center;}
  .head h1{font-size:24px;font-weight:600;letter-spacing:-.02em;}
  .head p{color:#6b6a63;font-size:13px;margin-top:8px;font-weight:300;}

  .stage{width:100%;max-width:880px;display:flex;justify-content:center;}

  /* ===== Claude 디자인 명함 (90x50mm 비율) ===== */
  .card{
    width:100%;max-width:860px;aspect-ratio:486/270;
    container-type:inline-size;
    background:#F0EEE6;color:#1f1e1d;
    font-family:'Inter',sans-serif;
    border-radius:3.4cqw;overflow:hidden;
    border:1px solid #DEDBCE;
    box-shadow:0 10px 30px rgba(61,58,52,.10);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:7.6cqw 7.6cqw;
  }
  .card .top{display:flex;justify-content:space-between;align-items:center;}
  .logo{display:flex;align-items:center;gap:2cqw;}
  .spark{width:5.2cqw;height:5.2cqw;color:#CC785C;flex:0 0 auto;}
  .logo .wm{font-size:3cqw;font-weight:600;letter-spacing:.04em;color:#1f1e1d;}
  .brandtag{font-size:2.1cqw;letter-spacing:.2em;color:#94918a;text-align:right;font-weight:500;}

  .mid{display:flex;flex-direction:column;}
  .mono{font-family:'Newsreader',serif;font-size:13cqw;font-weight:300;letter-spacing:-.01em;line-height:1;display:inline-flex;align-items:center;}
  .mono .cur{width:.045em;height:.72em;background:#CC785C;margin-left:.14em;border-radius:1px;animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .role{font-size:2.7cqw;color:#56544e;font-weight:400;margin-top:3.4cqw;}
  .role b{color:#1f1e1d;font-weight:500;}

  .bottom{display:flex;flex-direction:column;}
  .contact{display:grid;grid-template-columns:1fr 1fr;gap:2.4cqw 5%;font-size:2.5cqw;color:#3d3b36;font-weight:400;}
  .contact .k{color:#CC785C;display:inline-block;width:12cqw;font-weight:500;}
  .footline{display:flex;justify-content:space-between;font-size:2.1cqw;color:#94918a;margin-top:4cqw;}
  .footline .a{font-family:'Newsreader',serif;font-style:italic;}

  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:0;border-radius:10px;padding:12px 22px;cursor:pointer;background:#CC785C;color:#fff;}
  .btn.sec{background:#F0EEE6;color:#1f1e1d;border:1px solid #d8d4c6;}
  .hint{font-size:12px;color:#6b6a63;font-weight:300;text-align:center;max-width:560px;line-height:1.7;}
</style>
</head>
<body>
  <div class="head">
    <h1>DRT 명함 — AD · Claude 디자인</h1>
    <p>크림 배경 · 클레이 오렌지 · 세리프 · 클로드 스타 마크</p>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="top">
        <div class="logo">
          <svg class="spark" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
            <g>
              <rect x="46" y="4"  width="8" height="40" rx="4"/>
              <rect x="46" y="56" width="8" height="40" rx="4"/>
              <rect x="4"  y="46" width="40" height="8" rx="4"/>
              <rect x="56" y="46" width="40" height="8" rx="4"/>
              <rect x="46" y="4"  width="8" height="40" rx="4" transform="rotate(45 50 50)"/>
              <rect x="46" y="56" width="8" height="40" rx="4" transform="rotate(45 50 50)"/>
              <rect x="46" y="4"  width="8" height="40" rx="4" transform="rotate(22.5 50 50)"/>
              <rect x="46" y="56" width="8" height="40" rx="4" transform="rotate(22.5 50 50)"/>
              <rect x="46" y="4"  width="8" height="40" rx="4" transform="rotate(67.5 50 50)"/>
              <rect x="46" y="56" width="8" height="40" rx="4" transform="rotate(67.5 50 50)"/>
            </g>
          </svg>
          <span class="wm">DRT</span>
        </div>
        <div class="brandtag">WEB STUDIO</div>
      </div>

      <div class="mid">
        <div class="mono">AD<span class="cur"></span></div>
        <div class="role"><b>Full-Stack Developer</b> · Web Specialist</div>
      </div>

      <div class="bottom">
        <div class="contact">
          <div><span class="k">mobile</span>+82 10-7466-7775</div>
          <div><span class="k">email</span>cheb2oy@naver.com</div>
          <div><span class="k">web</span>www.drt.dev</div>
          <div><span class="k">git</span>github.com/ad-drt</div>
        </div>
        <div class="footline"><span class="a">build the web.</span><span>Seoul, KR</span></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="dl">고화질 PNG 다운로드 (3배)</button>
    <button class="btn sec" id="dl2">초고화질 PNG (4배)</button>
  </div>
  <div class="hint">버튼을 누르면 명함이 PNG로 저장돼요. 카카오톡·메일로 그대로 넘기시면 돼요.</div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <script>
    async function save(ratio){
      const node = document.getElementById('card');
      const url = await htmlToImage.toPng(node, {pixelRatio: ratio, cacheBust: true});
      const a = document.createElement('a'); a.download='DRT-AD-claude.png'; a.href=url; a.click();
    }
    document.getElementById('dl').addEventListener('click', ()=>save(3));
    document.getElementById('dl2').addEventListener('click', ()=>save(4));
  </script>
</body>
</html>
